# Server
server.port=8082

# PostgreSQL - credentials from environment variables (no hardcoding)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/order_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ Queue Config
order.rabbitmq.exchange=order-exchange
order.rabbitmq.queue=order-queue
order.rabbitmq.routingkey=order.created

# Product Service URL
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
